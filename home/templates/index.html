{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Resume Builder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geom:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static '\css\style.css' %}">
</head>

<body>

    <div class="app-container">
        <div class="app-header">
            <h1>Resume Builder</h1>
            <p class="text-white">Create a clean, professional resume in minutes</p>
        </div>

        <form action="{% url 'resume' %}" method="post">
            {% csrf_token %}

            <!-- PROFILE -->
            <div class="card p-4">
                <div class="section-title">Profile</div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <input class="form-control" name="name" placeholder="Full name">
                    </div>
                    <div class="col-md-6">
                        <input class="form-control" name="title"
                            placeholder="Professional title (e.g. Full Stack Developer)">
                    </div>

                    <div class="col-md-6">
                        <input class="form-control" name="email" placeholder="Email address">
                    </div>
                    <div class="col-md-6">
                        <input class="form-control" name="phone" placeholder="Phone number">
                    </div>

                    <div class="col-12">
                        <textarea class="form-control" rows="3" name="about"
                            placeholder="Short professional summary (2–3 lines)"></textarea>
                        <div class="hint">Keep this concise and impact-focused.</div>
                    </div>
                </div>
            </div>

            <!-- SKILLS -->
            <div class="card p-4">
                <div class="section-title">Skills</div>
                <input class="form-control" name="skills" placeholder="e.g. Python, Django, JavaScript, MySQL, Git">
                <div class="hint">Comma-separated skills work best.</div>
            </div>

            <!-- EXPERIENCE -->
            <div class="card p-4">
                <div class="section-title">Experience</div>

                <div class="row g-3">
                    <div class="col-md-5">
                        <input class="form-control" name="company1" placeholder="Company name">
                    </div>
                    <div class="col-md-4">
                        <input class="form-control" name="post1" placeholder="Role">
                    </div>
                    <div class="col-md-3">
                        <input class="form-control" name="duration1" placeholder="Duration">
                    </div>

                    <div class="col-12">
                        <textarea class="form-control" rows="3" name="lin11"
                            placeholder="Key responsibilities and achievements"></textarea>
                    </div>
                </div>
            </div>

            <!-- PROJECT -->
            <div class="card p-4">
                <div class="section-title">Projects</div>

                <div class="row g-3">
                    <div class="col-md-8">
                        <input class="form-control" name="project1" placeholder="Project name">
                    </div>
                    <div class="col-md-4">
                        <input class="form-control" name="durat1" placeholder="Duration">
                    </div>

                    <div class="col-12">
                        <textarea class="form-control" rows="3" name="desc1"
                            placeholder="What you built, technologies used, and outcome"></textarea>
                    </div>
                </div>
            </div>

            <!-- EDUCATION -->
            <div class="card p-4">
                <div class="section-title">Education</div>

                <div class="row g-3">
                    <div class="col-md-5">
                        <input class="form-control" name="degree1" placeholder="Degree">
                    </div>
                    <div class="col-md-5">
                        <input class="form-control" name="college1" placeholder="Institution">
                    </div>
                    <div class="col-md-2">
                        <input class="form-control" name="year1" placeholder="Year">
                    </div>
                </div>
            </div>

            <!-- ACHIEVEMENTS -->
            <div class="card p-4">
                <div class="section-title">Achievements (Optional)</div>
                <textarea class="form-control" rows="3" name="ach1"
                    placeholder="Awards, certifications, or notable accomplishments"></textarea>
            </div>

            <div class="text-center mt-4">
                <button class="btn primary-btn btn-lg">
                    Generate Resume
                </button>
            </div>

        </form>
    </div>

</body>

</html>
